name = "llm-proxy-router"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

[vars]
WORKER_ROLE = "router"
AUTH_KEY = "change-me-in-production"
INTERNAL_AUTH_SECRET = "change-me-in-production"
PROXY_COUNT = "3"

[[services]]
binding = "PROXY_1"
service = "llm-proxy-01"

[[services]]
binding = "PROXY_2"
service = "llm-proxy-02"

[[services]]
binding = "PROXY_3"
service = "llm-proxy-03"

